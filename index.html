<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>🧊 后室煎熬·无止尽坠落 | 实体塔防 恐怖PWA</title>
  <meta name="theme-color" content="#0a0f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
    body { background:#050a0a; font-family:'Courier New',monospace; display:flex; justify-content:center; align-items:center; min-height:100vh; padding:12px; background-image:radial-gradient(circle at 30% 20%, #1a2a1a 0%, #030805 100%); overflow-x:hidden; }
    #app { width:100%; max-width:1550px; background:#2e1c0c; border-radius:32px; padding:12px; box-shadow:0 20px 0 #1a0e05; margin:auto; border:1px solid #7a5a2a; }
    .canvas-wrapper { overflow:auto; border-radius:20px; background:#000000; max-height:65vh; border:3px solid #9e6a3a; box-shadow:inset 0 0 30px rgba(0,0,0,0.8); }
    canvas { display:block; margin:0 auto; image-rendering:pixelated; background:#010101; cursor:crosshair; filter: drop-shadow(0 0 2px #3a2a0a); }
    .panel { display:flex; flex-wrap:wrap; gap:8px; background:#3a2416; padding:10px; border-radius:28px; margin-bottom:8px; align-items:center; justify-content:space-between; box-shadow:0 4px 0 #1f1208; border-bottom:2px solid #926e3a; }
    .sun,.coin { padding:6px 14px; border-radius:40px; font-size:12px; display:inline-flex; gap:6px; align-items:center; background:#1f1a0c; color:#ffd966; border:1px solid #ccaa55; text-shadow:0 0 3px #ffaa33; }
    .coin { background:#2a2410; }
    .btn { background:#7a4a2a; border:none; color:#f9e2a1; padding:8px 14px; border-radius:40px; font-family:'Courier New',monospace; font-size:9px; font-weight:bold; cursor:pointer; box-shadow:0 4px 0 #3a220e; transition:0.05s linear; white-space:nowrap; letter-spacing:1px; }
    .btn:active { transform:translateY(3px); box-shadow:0 1px 0 #3a220e; }
    .btn.sel { outline:3px solid #ffaa44; background:#aa6a3a; box-shadow:0 0 8px #ffaa55; }
    .upgrade-panel { background:#231b0e; border-radius:20px; padding:10px; margin-top:8px; display:flex; flex-wrap:wrap; gap:6px; justify-content:center; border:1px solid #6a4a2a; }
    .upgrade-btn { background:#3a4e6a; font-size:8px; padding:6px 12px; box-shadow:0 2px 0 #1a2e4a; }
    .login,.menu { text-align:center; color:#ffdd99; padding:30px 20px; background:rgba(0,0,0,0.45); border-radius:40px; backdrop-filter:blur(2px); }
    .login-input { background:#1a1108; border:2px solid #b87c4a; border-radius:40px; padding:12px; margin:10px auto; width:280px; font-family:'Courier New',monospace; font-size:10px; color:#ffcc88; text-align:center; }
    .level-card { background:#4a2a14; border-radius:22px; padding:12px 6px; width:115px; text-align:center; cursor:pointer; margin:6px; display:inline-block; border:2px solid #8a623a; color:#ffdd99; transition:0.1s; }
    .level-card:hover { background:#7a4a2a; border-color:#ffcc66; transform:scale(0.98); }
    .levels-grid { display:flex; flex-wrap:wrap; justify-content:center; gap:10px; margin:15px 0; max-height:400px; overflow-y:auto; padding:10px; background:rgba(0,0,0,0.65); border-radius:20px; }
    .tip { font-size:7px; margin-top:8px; color:#ccaa77; background:rgba(0,0,0,0.7); padding:6px 12px; border-radius:30px; border-left:3px solid #ff8844; }
    .stock-panel { background:#0a0f1c; border-radius:20px; margin-top:15px; padding:12px; border:2px solid #aa6644; box-shadow:0 0 12px rgba(255,80,0,0.3); }
    .horror-overlay { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:150; background:radial-gradient(circle, transparent 50%, rgba(0,0,0,0.6) 120%); opacity:0; transition:0.2s; }
    .dread-text { position:fixed; bottom:15%; left:5%; background:#000000aa; color:#ffaa88; font-size:9px; padding:8px 15px; border-radius:30px; backdrop-filter:blur(4px); font-family:monospace; border-left:4px solid #ff4444; pointer-events:none; z-index:160; white-space:nowrap; animation: fadeDread 3s forwards; }
    @keyframes fadeDread { 0%{opacity:0; transform:translateX(-20px);} 15%{opacity:1;} 80%{opacity:1;} 100%{opacity:0; transform:translateX(30px);} }
    .sanity-warning { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(80,0,0,0.2); pointer-events:none; z-index:140; animation: pulseRed 1.2s infinite; }
    @keyframes pulseRed { 0%{background:rgba(80,0,0,0);} 50%{background:rgba(120,20,0,0.2);} 100%{background:rgba(80,0,0,0);} }
    #horrorMsg { position:fixed; top:22%; left:50%; transform:translate(-50%,-50%); font-size:14px; font-weight:bold; color:#ffbb99; text-shadow:0 0 12px red; background:#000000bb; padding:10px 24px; border-radius:60px; white-space:nowrap; z-index:200; opacity:0; transition:0.15s; border:1px solid #ff6644; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div id="app">
  <div id="loginScreen"><div class="login"><h1 style="font-size:18px;">⬛ 后室·无尽煎熬 ⬛</h1><p style="margin:12px 0 6px;">理智归零即是沦陷 | 实体低语 | 经济崩溃</p><p style="font-size:8px;">600层炼狱 · 12层恐惧变异</p><input type="text" id="username" class="login-input" placeholder="濒死流浪者姓名"><button id="loginBtn" class="btn" style="font-size:11px;">🔻 坠入后室 🔻</button><div id="loginError" class="error-msg"></div></div></div>
  <div id="menuScreen" style="display:none;"><div class="menu"><h1>🎭 绝望主菜单 🎭</h1><div style="display:flex;gap:12px;justify-content:center;margin:18px 0;"><button id="startGameBtn" class="btn">🧠 选择层级(折磨)</button><button id="menuUpgradeBtn" class="btn">⬆️ 苟且强化</button><button id="stockTradeBtn" class="btn">📉 崩盘股市</button></div><div id="levelsContainer" class="levels-grid" style="display:none;"></div><div id="menuUpgradePanel" class="upgrade-panel" style="display:none;"></div><div id="stockMarketPanel" style="display:none;" class="stock-panel"></div><div class="tip">💀 理智持续腐蚀 · 低理智加速实体&减产 · 随机惨剧 · 杏仁水稀缺 · 连空气都在尖叫</div><div style="margin-top:12px;">🪙 痛苦币: <span id="menuCurrency">0</span> &nbsp;| 🏚️ 苟活层级: <span id="menuCompleted">0</span>/600</div></div></div>
  <div id="gameScreen" style="display:none;"><div class="panel"><div class="sun">☀️ 残阳 <span id="sunAmount">150</span></div><div class="coin">🪙 折磨币 <span id="currencyAmount">0</span></div><div class="btn-group" id="plantButtons"><button class="btn sel" data-plant="Pea">🌱豌·萎靡</button><button class="btn" data-plant="Snow">❄️寒·冻伤</button><button class="btn" data-plant="Sun">🌻枯葵</button><button class="btn" data-plant="Nut">🥜腐朽坚果</button><button class="btn" data-plant="Pot">🪴裂痕花盆</button><button class="btn" data-plant="Potato">🥔瘿土豆雷</button><button class="btn" data-plant="Cherry">🍒血樱桃</button><button class="btn" data-plant="TallNut">🪵高耸墓碑</button></div><button id="showUpgradeBtn" class="btn">⬆️ 绝望升级</button></div><div id="upgradePanel" class="upgrade-panel" style="display:none;"></div><div class="canvas-wrapper"><canvas id="gameCanvas" width="800" height="1080"></canvas></div><div class="tip">⚡ 理智越低阳光减产&僵尸亢奋 | 杏仁水💧延缓疯狂 | 花盆增加植物抗性 | 后室低语萦绕</div><button id="backToMenuBtn" class="btn" style="margin-top:8px;">🏠 逃回大厅(暂时)</button></div>
</div>
<div id="horrorMsg"></div>
<div id="globalOverlay" class="horror-overlay"></div>
<script>
(function(){
  // ---------- 极致煎熬参数 ----------
  let globalCurrency = 0;
  let plantUpgrades = { pea_damage:0, pea_speed:0, sun_value:0, nut_hp:0, bomb_damage:0 };
  let currentGameUser = null, currentLevel = 1, completedLevels = 0, gameState = "MENU";
  let updateInterval = null, animFrameId = null, selectedPlant = "Pea";
  let ROWS = 9, COLS = 8, CELL_W = 100, CELL_H = 120, sun = 150, wave = 1, bossesDefeated = 0;
  let grid = [], terrain = [], zombies = [], bullets = [], sunDrops = [], almondWaters = [];
  let lastWaveTime = 0, lastSpawnTime = 0, lastGameUpdate = 0, logicAcc = 0;
  const TOTAL_LEVELS = 600, WIN_WAVE = 50, FIXED_STEP = 33;
  let sanity = 100, MAX_SANITY = 100, insanityFlag = false, dreadAcc = 0, lastDreadMsgTime = 0;
  let terrorShake = 0;          // 屏幕震动强度
  let lowSanityOverlay = 0;
  
  // 折磨文本池
  const DREAD_QUOTES = [
    "墙壁渗出粘液...", "远处传来咀嚼声", "你感觉被凝视", "理智的纤维断裂", "空气变得冰冷", "有什么东西在身后", "杏仁水越来越腥", "灯光闪烁 忽明忽暗", 
    "实体磨牙的声音", "你忘记来时的路", "后室在生长", "恐惧具象化", "时间流速诡异", "尸体在窃笑", "植物也在颤抖", "死亡在指缝间流逝"
  ];
  
  // 后室实体库 (更压抑)
  const ENTITIES = {
    Smiler:{ hp:3, speed:2.9, color:"#ffaa66", special:"fear", reward:35, name:"笑魇" },
    Hound:{ hp:2, speed:3.4, color:"#886666", special:"rush", reward:28, name:"猎犬" },
    Partygoer:{ hp:7, speed:1.2, color:"#ff8844", special:"convert", reward:65, name:"派对客" },
    Normal:{ hp:4, speed:1.6, color:"#b87c4a", reward:18, name:"沦丧者" },
    Creeper:{ hp:6, speed:1.4, color:"#6f8a4a", reward:22, name:"匍匐变体" },
    Giant:{ hp:18, speed:0.95, color:"#cf6f3a", reward:95, name:"巨像残骸" }
  };
  
  const $ = id => document.getElementById(id);
  const canvas = $('gameCanvas'), ctx = canvas.getContext('2d');
  let flashTimer;
  function flashMsg(text,color,dur){ let el=$('horrorMsg'); el.textContent=text; el.style.color=color; el.style.opacity='1'; clearTimeout(flashTimer); flashTimer=setTimeout(()=>el.style.opacity='0',dur); }
  
  // 后室主题 (加深绝望感)
  const THEMES = [
    {name:"Level 0 - 腐臭大厅",grass:"#b38f5a",w:0.09,r:0.05,m:0.06,despair:"回响不断"},
    {name:"Level 1 - 仓储深渊",grass:"#6a5a4a",w:0.03,r:0.17,m:0.05,despair:"货架阴影"},
    {name:"Level 2 - 喉管管道",grass:"#4a4a3a",w:0.01,r:0.18,m:0.07,despair:"金属锈味"},
    {name:"Level 3 - 废弃电站",grass:"#5a5a3a",w:0.02,r:0.15,m:0.09,despair:"嗡鸣不止"},
    {name:"Level 4 - 荒芜办公室",grass:"#c9b07a",w:0.04,r:0.09,m:0.04,despair:"文件腐烂"},
    {name:"Level 5 - 无尽旅馆",grass:"#7a5a4a",w:0.16,r:0.06,m:0.22,despair:"走廊无限"},
    {name:"Level 6 - 黑暗子宮",grass:"#2c2c2c",w:0.09,r:0.04,m:0.12,despair:"绝对黑暗"},
    {name:"Level 7 - 深海溺亡",grass:"#2a4a6a",w:0.35,r:0.05,m:0.03,despair:"窒息感"},
    {name:"Level 8 - 崩塌废墟",grass:"#6a5a4a",w:0.02,r:0.28,m:0.12,despair:"碎石埋骨"},
    {name:"Level 9 - 死寂郊区",grass:"#5a7a3a",w:0.03,r:0.23,m:0.10,despair:"无人的家"},
    {name:"Level 10 - 枯萎田野",grass:"#8a7a4a",w:0.02,r:0.03,m:0.03,despair:"稻草人眨眼"},
    {name:"Level 11 - 无尽哀城",grass:"#4a3a5a",w:0.06,r:0.17,m:0.07,despair:"万人低语"}
  ];
  function getTheme(lv){ return THEMES[Math.min(Math.floor((lv-1)/50),11)]; }
  function getRows(lv){ return Math.min(42,9+Math.floor((lv-1)*33/599)); }
  
  // 存档/股票 (更加痛苦的经济)
  let stockData = { holdings: {}, prices: {}, history: [], crashCooldown:0 };
  const STOCKS = ["后室废土股", "杏仁水黑市", "笑魇恐惧基金", "派对客传销"];
  function saveGame(){
    if(!currentGameUser)return;
    let save = { currency:globalCurrency, upgrades:plantUpgrades, completed:completedLevels, stockHoldings:stockData.holdings, stockPrices:stockData.prices };
    localStorage.setItem('cdbr_'+currentGameUser, JSON.stringify(save));
  }
  function loadGame(){
    if(!currentGameUser)return;
    let d = localStorage.getItem('cdbr_'+currentGameUser);
    if(d){
      let data = JSON.parse(d);
      globalCurrency = data.currency || 0;
      plantUpgrades = data.upgrades || {pea_damage:0,pea_speed:0,sun_value:0,nut_hp:0,bomb_damage:0};
      completedLevels = data.completed || 0;
      stockData.holdings = data.stockHoldings || {};
      stockData.prices = data.stockPrices || {};
    }
    if(Object.keys(stockData.prices).length===0) STOCKS.forEach(s=> stockData.prices[s]=45+Math.random()*50);
    updateUI();
  }
  function updateUI(){ 
    $('currencyAmount').innerText = Math.floor(globalCurrency);
    if($('menuCurrency')) $('menuCurrency').innerText = Math.floor(globalCurrency);
    if($('menuCompleted')) $('menuCompleted').innerText = completedLevels;
  }
  
  // 地形生成
  function genTerrain(lv,rows){
    let t = Array(rows).fill().map(()=>Array(COLS).fill('grass'));
    let th = getTheme(lv);
    for(let r=0;r<rows;r++) for(let c=0;c<COLS;c++){
      let rand=Math.random(), cum=0;
      cum+=th.w; if(rand<cum){t[r][c]='water';continue;}
      cum+=th.r; if(rand<cum){t[r][c]='rock';continue;}
      cum+=th.m; if(rand<cum){t[r][c]='mud';continue;}
    }
    return t;
  }
  
  // 理智煎熬系统 + 影响游戏难度
  function updateSanityWithAgony(dt){
    let decay = 0.014 * dt;
    let theme = getTheme(currentLevel);
    if(theme.name.includes("黑暗")) decay*=2.0;
    if(theme.name.includes("溺亡")) decay*=1.7;
    sanity = Math.max(0, sanity - decay);
    // 理智极低时额外惩罚
    if(sanity<25 && !insanityFlag && Math.random()<0.003*dt) triggerHorrorEvent(true);
    if(sanity<=0 && !insanityFlag) triggerInsanityDeath();
    // 产生低语文本 (更加压抑)
    if(Date.now() - lastDreadMsgTime > 8000 && sanity<70 && Math.random()<0.2){
      let msg = DREAD_QUOTES[Math.floor(Math.random()*DREAD_QUOTES.length)];
      showDreadText(msg);
      lastDreadMsgTime = Date.now();
    }
  }
  function showDreadText(msg){
    let div = document.createElement('div'); div.className='dread-text'; div.innerText=`⚠️ ${msg} ⚠️`; document.body.appendChild(div);
    setTimeout(()=>div.remove(), 3200);
  }
  function triggerHorrorEvent(strong=false){
    let r = Math.random();
    if(strong || r<0.4){
      terrorShake = 12;
      flashMsg("⚡ 后室恶意具现 ⚡","#ff6666",900);
      if(Math.random()<0.5){ // 阳光瞬间减少
        sun = Math.max(30, sun-35);
        $('sunAmount').innerText = Math.floor(sun);
        showDreadText("阳光被吞噬...");
      } else { // 随机一个植物枯萎
        let possible=[];
        for(let i=0;i<ROWS;i++) for(let j=0;j<COLS;j++) if(grid[i][j]) possible.push([i,j]);
        if(possible.length){ let [r2,c2]=possible[Math.floor(Math.random()*possible.length)]; grid[r2][c2]=null; flashMsg("🌿 植物被恐惧碾碎","#ff8888",700); }
      }
    } else {
      showDreadText("👁️ 你感觉到有东西在注视你");
      sanity = Math.max(0, sanity-7);
    }
  }
  function triggerInsanityDeath(){
    if(insanityFlag) return;
    insanityFlag=true;
    flashMsg("💀 理智彻底崩溃 · 实体从四面八方涌入 💀","#ff0000",2800);
    for(let i=0;i<12;i++) zombies.push({ x:COLS*CELL_W+Math.random()*400, row:Math.floor(Math.random()*ROWS), hp:1, maxHp:1, type:"幻影", color:"rgba(200,0,0,0.6)", speed:0.7, baseSpeed:0.7, isFake:true, reward:0 });
    setTimeout(()=> gameOver(false), 5000);
  }
  
  // 僵尸速度受理智影响 (愈发煎熬)
  function getSpeedMultiplierBySanity(){ return 1 + ( (MAX_SANITY - Math.max(10,sanity)) / MAX_SANITY ) * 0.65; }
  
  // 核心战斗逻辑 (改压力)
  function updateGameSim(dt){
    let sanityMult = getSpeedMultiplierBySanity();
    // 植物逻辑
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
      let p = grid[r][c]; if(!p) continue;
      let plant = p.type==="Pot" && p.underPlant ? p.underPlant : p;
      if(plant.cd>0) plant.cd-=dt;
      if(plant.sunTimer>0) plant.sunTimer-=dt;
      if(plant.fuse>0) plant.fuse-=dt;
      // 向日葵产量受理智影响 (绝望减产)
      let sanityYieldFactor = Math.max(0.3, sanity/100);
      if(plant.type==="Sun" && plant.sunTimer<=0){
        let gain = Math.floor((25 + plantUpgrades.sun_value*5) * sanityYieldFactor);
        sun += Math.max(8, gain);
        sunDrops.push({x:c*CELL_W+50,y:r*CELL_H+20,life:55});
        plant.sunTimer = 180;
      }
      let hasZombie = zombies.some(z=>z.row===r && z.x<COLS*CELL_W);
      if(hasZombie && plant.type==="Pea" && plant.cd<=0){
        bullets.push({x:c*CELL_W+70,y:r*CELL_H+55,row:r,type:"pea",dmg:1+plantUpgrades.pea_damage});
        plant.cd = Math.max(9, 20 - plantUpgrades.pea_speed*2);
      }else if(hasZombie && plant.type==="Snow" && plant.cd<=0){
        bullets.push({x:c*CELL_W+70,y:r*CELL_H+55,row:r,type:"ice",dmg:1});
        plant.cd = 24;
      }
      if(plant.type==="Potato" && plant.fuse!==undefined && plant.fuse<=0){
        for(let i=zombies.length-1;i>=0;i--){
          let z=zombies[i];
          if(Math.abs(z.row-r)<=1 && Math.abs(z.x/CELL_W - c)<=1.3) zombies.splice(i,1);
        }
        grid[r][c]=null;
        flashMsg("💥 腐败土豆雷殉爆","#ffaa55",500);
      }
      if(plant.type==="Cherry" && plant.cd<=0){
        zombies = [];
        flashMsg("🍒 血樱桃 · 虚无吞噬","#ff3300",700);
        grid[r][c]=null;
      }
    }
    // 子弹
    for(let i=0;i<bullets.length;i++){
      let b = bullets[i];
      b.x += (b.type==="ice"? 9:13)*dt;
      let hit=false;
      for(let j=0;j<zombies.length;j++){
        let z=zombies[j];
        if(z.row===b.row && b.x+8 > z.x && b.x < z.x+CELL_W){
          z.hp -= b.dmg;
          if(b.type==="ice") z.slowTimer = 75;
          if(z.hp<=0){
            globalCurrency += z.reward || 12;
            if(z.isBoss) bossesDefeated++;
            zombies.splice(j,1);
          }
          hit=true; break;
        }
      }
      if(hit || b.x>COLS*CELL_W+100){ bullets.splice(i,1); i--; }
    }
    // 僵尸移动 + 压迫力
    for(let i=0;i<zombies.length;i++){
      let z = zombies[i];
      if(z.isFake){ z.x -= z.speed*dt; if(z.x< -60) zombies.splice(i,1); continue; }
      if(z.special==="fear" && Math.random()<0.02*dt){
        let col = Math.floor(z.x/CELL_W);
        if(col>=0 && col<COLS && grid[z.row][col]){ grid[z.row][col]=null; flashMsg("😱 笑魇惊走植物","#ffaa77",700); showDreadText("心脏停跳一拍"); }
      }
      if(z.special==="convert" && Math.random()<0.024*dt){
        let col = Math.floor(z.x/CELL_W);
        if(col>=0 && col<COLS && grid[z.row][col]){ grid[z.row][col]=null; flashMsg("🎉 派对客腐化植物","#ff8844",700); }
      }
      let speedBonus = sanityMult;
      let finalSpeed = (z.slowTimer>0 ? z.baseSpeed*0.5 : z.speed) * speedBonus;
      if(z.slowTimer>0) z.slowTimer-=dt;
      let move = finalSpeed * dt;
      let colIdx = Math.floor(z.x/CELL_W);
      if(colIdx>=0 && colIdx<COLS){
        let tile = terrain[z.row][colIdx];
        if(tile==='water') move*=0.55;
        if(tile==='mud') move*=0.75;
        if(tile==='rock') move*=0.92;
      }
      z.x -= move;
      if(z.hp<=0){ zombies.splice(i,1); continue; }
      let attackCol = Math.floor(z.x/CELL_W);
      if(attackCol>=0 && attackCol<COLS && grid[z.row][attackCol]){
        let defender = grid[z.row][attackCol];
        let targetPlant = defender.type==="Pot" && defender.underPlant ? defender.underPlant : defender;
        if(z.attackCd<=0){
          let dmg = z.isBoss ? 3 : (z.type==="Giant"?2:1);
          targetPlant.hp -= dmg;
          z.attackCd = 32;
          if(targetPlant.hp<=0){
            if(defender.type==="Pot") grid[z.row][attackCol]=null;
            else grid[z.row][attackCol]=null;
            showDreadText("植物在尖叫中枯萎");
          }
        }
      }
      if(z.attackCd>0) z.attackCd-=dt;
      if(z.x<12){ gameOver(false); return; }
    }
    // 杏仁水更低概率 (更煎熬)
    if(Math.random()<0.0016 && almondWaters.length<3) almondWaters.push({x:20+Math.random()*(COLS*CELL_W-40),y:20+Math.random()*(ROWS*CELL_H-40),life:700});
    // 阳光掉落收集
    for(let i=0;i<sunDrops.length;i++){ sunDrops[i].y+=0.9*dt; if(sunDrops[i].life--<=0 || sunDrops[i].y>ROWS*CELL_H) sunDrops.splice(i,1); }
    updateSanityWithAgony(dt);
    // 屏幕震动衰减
    if(terrorShake>0) terrorShake-=dt*0.8;
    // 低理智红色覆盖
    lowSanityOverlay = Math.min(0.55, (MAX_SANITY-sanity)/150);
  }
  
  function spawnZombie(now){
    if(zombies.filter(z=>!z.isFake).length>22) return;
    let isBossWave = wave>=10 && bossesDefeated<3 && wave%12===0 && !zombies.some(z=>z.isBoss);
    if(isBossWave){
      let hp = 55 + currentLevel*2 + bossesDefeated*14;
      zombies.push({ x:COLS*CELL_W, row:Math.floor(Math.random()*ROWS), hp:hp, maxHp:hp, type:"深渊扭曲体", color:"#ff5555", isBoss:true, baseSpeed:0.85, speed:0.85, reward:380+currentLevel*18, attackCd:0, slowTimer:0 });
      bossesDefeated++;
      flashMsg("⚠️ 深渊实体破壁 ⚠️","#ffaa55",1500);
      return;
    }
    let roll = Math.random();
    let baseType = "Normal";
    if(currentLevel>20 && roll<0.45){ let keys = ["Smiler","Hound","Partygoer"]; baseType = keys[Math.floor(Math.random()*3)]; }
    else if(roll<0.6) baseType="Normal";
    else if(roll<0.8) baseType="Creeper";
    else baseType="Giant";
    let data = ENTITIES[baseType] || ENTITIES.Normal;
    let bonusHp = Math.floor(currentLevel/3.5);
    zombies.push({ x:COLS*CELL_W, row:Math.floor(Math.random()*ROWS), hp:data.hp+bonusHp, maxHp:data.hp+bonusHp, type:data.name||baseType, color:data.color, speed:data.speed, baseSpeed:data.speed, reward:data.reward+Math.floor(currentLevel/2.5), special:data.special || null, attackCd:0, slowTimer:0, isBoss:false, isFake:false });
  }
  
  function gameOver(win){
    if(gameState!=="PLAYING") return;
    gameState="END"; clearInterval(updateInterval); updateInterval=null;
    let bonus = Math.floor(sun/7);
    globalCurrency += bonus;
    if(win){
      if(currentLevel>completedLevels) completedLevels = currentLevel;
      flashMsg(`🏚️ 侥幸存活 Level ${currentLevel} ... 获得 ${bonus} 痛苦币`, "#ccaa88", 2500);
    } else flashMsg(`💀 你被后室吞噬... 获得 ${bonus} 币, 但灵魂磨损`, "#ff7777", 2800);
    saveGame(); updateUI();
    showMenu();
  }
  
  function startLevel(lv){
    if(lv>TOTAL_LEVELS) return alert("没有尽头...你似乎永远困在这里");
    currentLevel=lv; ROWS=getRows(lv); CELL_H = Math.min(130, Math.floor(850/ROWS));
    canvas.height = ROWS*CELL_H;
    terrain = genTerrain(lv, ROWS);
    grid = Array(ROWS).fill().map(()=>Array(COLS).fill(null));
    zombies = []; bullets = []; sunDrops = []; almondWaters = [];
    wave = 1; sun = 160; bossesDefeated=0; sanity=100; insanityFlag=false; terrorShake=0;
    $('sunAmount').innerText=sun;
    updateUI();
    gameScreen.style.display="block"; menuScreen.style.display="none"; gameState="PLAYING";
    let now = performance.now(); lastWaveTime=now; lastSpawnTime=now; lastGameUpdate=now; logicAcc=0;
    function renderLoop(){ if(gameState==="PLAYING") drawFrame(); animFrameId = requestAnimationFrame(renderLoop); }
    renderLoop();
    updateInterval = setInterval(()=>{
      if(gameState!=="PLAYING") return;
      let now2 = performance.now(), dt = Math.min(now2-lastGameUpdate, 120);
      lastGameUpdate = now2; logicAcc += dt;
      while(logicAcc >= FIXED_STEP){
        let nowTick = performance.now();
        if(nowTick - lastWaveTime >= 9500 + Math.random()*5500){
          wave++; lastWaveTime = nowTick;
          if(wave>WIN_WAVE) wave=WIN_WAVE;
          if(wave%5===0) showDreadText(`第${wave}波 · 绝望逼近`);
        }
        let spawnDelay = Math.max(300, 1250 - currentLevel*1.5 - wave*2.5);
        if(nowTick - lastSpawnTime >= spawnDelay && zombies.filter(z=>!z.isBoss).length<24){
          spawnZombie(nowTick);
          lastSpawnTime = nowTick;
        }
        if(wave>=WIN_WAVE && zombies.length===0){ gameOver(true); return; }
        updateGameSim(1);
        logicAcc -= FIXED_STEP;
      }
    }, 33);
  }
  
  // 绘图 (颤抖+暗角+低理智)
  function drawFrame(){
    ctx.save();
    if(terrorShake>0){
      let sx = (Math.random()-0.5)*terrorShake;
      let sy = (Math.random()-0.5)*terrorShake;
      ctx.translate(sx, sy);
    }
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let th = getTheme(currentLevel);
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
      let x=c*CELL_W, y=r*CELL_H, t=terrain[r][c];
      if(t==='grass') ctx.fillStyle=th.grass;
      else if(t==='water') ctx.fillStyle="#1c4a66";
      else if(t==='rock') ctx.fillStyle="#4a3a2a";
      else ctx.fillStyle="#5a3a1a";
      ctx.fillRect(x,y,CELL_W,CELL_H);
      ctx.strokeStyle="#1e1408"; ctx.strokeRect(x,y,CELL_W,CELL_H);
    }
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
      let p = grid[r][c]; if(!p) continue;
      let x=c*CELL_W, y=r*CELL_H;
      let main = p.type==="Pot" && p.underPlant ? p.underPlant : p;
      if(main.type==="Pea"){ ctx.fillStyle="#2f6b2f"; ctx.fillRect(x+10,y+30,70,55); ctx.fillStyle="#88aa44"; ctx.fillRect(x+38,y+43,14,14); }
      else if(main.type==="Snow"){ ctx.fillStyle="#3f8aaa"; ctx.fillRect(x+10,y+30,70,55); }
      else if(main.type==="Sun"){ ctx.fillStyle="#aa8844"; ctx.fillRect(x+12,y+35,65,48); ctx.fillStyle="#eebb55"; ctx.beginPath(); ctx.arc(x+45,y+58,10,0,Math.PI*2); ctx.fill(); }
      else if(main.type==="Nut"){ ctx.fillStyle="#8a6a3a"; ctx.fillRect(x+28,y+28,44,64); }
      else if(main.type==="TallNut"){ ctx.fillStyle="#9e7a4a"; ctx.fillRect(x+25,y+12,50,90); }
      else if(main.type==="Potato"){ ctx.fillStyle="#8b5a2b"; ctx.fillRect(x+22,y+48,56,28); }
      else if(main.type==="Cherry"){ ctx.fillStyle="#aa4444"; ctx.fillRect(x+20,y+42,60,42); }
      else if(p.type==="Pot"){ ctx.fillStyle="#ae7a4a"; ctx.fillRect(x+12,y+52,76,18); if(p.underPlant)ctx.fillStyle="#88aa66"; ctx.fillRect(x+18,y+32,64,22); }
      if(main.hp && main.maxHp){ ctx.fillStyle="#aa4422"; ctx.fillRect(x+8,y+5, (main.hp/main.maxHp)*80,5); }
    }
    bullets.forEach(b=>{ ctx.fillStyle=b.type==="ice"?"#88ddff":"#aaee66"; ctx.beginPath(); ctx.arc(b.x,b.y,5,0,Math.PI*2); ctx.fill(); });
    zombies.forEach(z=>{ ctx.fillStyle=z.color || "#b87c4a"; ctx.fillRect(z.x, z.row*CELL_H+CELL_H/2-22, CELL_W*0.55, 42); if(z.isBoss){ ctx.fillStyle="#ffaa66"; ctx.font="bold 13px monospace"; ctx.fillText("⚠️深渊⚠️",z.x+8,z.row*CELL_H+CELL_H/2-5); } });
    sunDrops.forEach(s=>{ ctx.fillStyle="#ffcc66"; ctx.beginPath(); ctx.arc(s.x,s.y,9,0,Math.PI*2); ctx.fill(); });
    almondWaters.forEach(a=>{ ctx.fillStyle="#44aaee"; ctx.beginPath(); ctx.arc(a.x,a.y,11,0,Math.PI*2); ctx.fill(); ctx.fillStyle="white"; ctx.fillText("💧",a.x-6,a.y+5); });
    ctx.fillStyle="#eeddbb"; ctx.font="bold 12px monospace"; ctx.fillText(`[${th.name}] 波 ${wave}/${WIN_WAVE} 理智:${Math.floor(sanity)}`,12,18);
    ctx.fillStyle="#3a1a0a"; ctx.fillRect(12,32,104,10); ctx.fillStyle="#ff8866"; ctx.fillRect(14,34,Math.min(100,sanity),6);
    if(sanity<45){
      ctx.globalAlpha=0.25 + (45-sanity)/150;
      ctx.fillStyle="#aa0000"; ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.globalAlpha=1;
      if(Math.random()<0.25){ let img=ctx.getImageData(0,0,canvas.width,canvas.height); for(let i=0;i<img.data.length;i+=4) img.data[i]+=Math.random()*40; ctx.putImageData(img,0,0); }
    }
    if(lowSanityOverlay>0.05){
      ctx.fillStyle=`rgba(80,0,0,${lowSanityOverlay*0.5})`;
      ctx.fillRect(0,0,canvas.width,canvas.height);
    }
    ctx.restore();
  }
  
  // 股票崩盘事件 (增加经济折磨)
  function updateStockCrash(){
    if(Math.random()<0.08 && gameState==="MENU"){
      let lossMult = 0.65 + Math.random()*0.3;
      for(let s of STOCKS) stockData.prices[s] = Math.max(8, stockData.prices[s]*lossMult);
      flashMsg("📉 后室股灾! 资产蒸发! 📉","#ff8844",2000);
      showDreadText("杏仁水市场崩盘，财富化为虚无");
      saveGame();
      if($('stockMarketPanel') && $('stockMarketPanel').style.display !== 'none') renderStockPanel();
    }
  }
  function renderStockPanel(){
    let panel = $('stockMarketPanel'); if(!panel) return;
    let totalValue = globalCurrency; for(let s of STOCKS) totalValue += (stockData.holdings[s]||0)*(stockData.prices[s]||50);
    panel.innerHTML = `<div class="stock-header"><span>📉 后室绝望交易所</span><span>残值: ${Math.floor(totalValue)} 🪙</span><button id="closeStockBtn" class="btn">❌ 关闭</button></div><div class="stock-grid" id="stockGrid"></div><div class="tip">⚠️ 随机崩盘机制，你的任何储蓄都可能蒸发</div><canvas id="equityMiniChart" height="70"></canvas>`;
    let gridDiv = $('#stockGrid'); gridDiv.innerHTML='';
    STOCKS.forEach(sym=>{
      let price = stockData.prices[sym]; let hold = stockData.holdings[sym]||0;
      let card = document.createElement('div'); card.className='stock-card'; card.style.background='#141d2e';
      card.innerHTML = `<h4>${sym}</h4><div>📉 ${price.toFixed(2)}</div><div>持仓: ${hold}</div><input id="qty_${sym}" type="number" value="1" class="trade-input" style="width:70px;"><div><button class="btn btn-buy" data-stock="${sym}" data-op="buy">绝望买入</button><button class="btn btn-sell" data-stock="${sym}" data-op="sell">割肉卖出</button></div>`;
      gridDiv.appendChild(card);
    });
    document.querySelectorAll('[data-op="buy"]').forEach(btn=>btn.onclick=()=>{
      let sym=btn.dataset.stock; let qty=parseInt($(`#qty_${sym}`).value)||1; let cost=qty*stockData.prices[sym];
      if(globalCurrency>=cost){ globalCurrency-=cost; stockData.holdings[sym]=(stockData.holdings[sym]||0)+qty; flashMsg(`买入了 ${sym} ×${qty} 但恐惧不减`,"#aaaaff",1000); updateUI(); saveGame(); renderStockPanel(); }
      else flashMsg("连买惨的币都不够了","#ff8888",800);
    });
    document.querySelectorAll('[data-op="sell"]').forEach(btn=>btn.onclick=()=>{
      let sym=btn.dataset.stock; let qty=parseInt($(`#qty_${sym}`).value)||1; let hold=stockData.holdings[sym]||0;
      if(hold>=qty){ let earn=qty*stockData.prices[sym]; globalCurrency+=earn; stockData.holdings[sym]-=qty; flashMsg(`绝望抛售 ${sym} ，获得微薄币`,"#88ffaa",900); updateUI(); saveGame(); renderStockPanel(); }
      else flashMsg("持仓不足","#ff8888",600);
    });
    $('#closeStockBtn').onclick=()=>{ panel.style.display='none'; };
    if(stockData.history.length){
      let ctx2=document.getElementById('equityMiniChart')?.getContext('2d'); if(ctx2) new Chart(ctx2,{type:'line',data:{labels:stockData.history.map((_,i)=>i),datasets:[{label:'资产',data:stockData.history,borderColor:'#ff6644',borderWidth:2,fill:false,tension:0.3}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false}}}});
    }
  }
  
  function showMenu(){
    if(updateInterval)clearInterval(updateInterval); if(animFrameId)cancelAnimationFrame(animFrameId);
    gameState="MENU"; gameScreen.style.display="none"; menuScreen.style.display="block";
    updateUI(); $('menuUpgradePanel').style.display="none"; $('levelsContainer').style.display="none"; $('stockMarketPanel').style.display="none";
  }
  function buildUpgradePanel(container){
    let upgrades = [{id:"pea_damage",label:"🌱豌豆腐蚀+1",cost:110,desc:plantUpgrades.pea_damage},{id:"pea_speed",label:"🌱射击焦虑下降",cost:85,desc:plantUpgrades.pea_speed},{id:"sun_value",label:"🌻枯葵产量+5",cost:130,desc:plantUpgrades.sun_value},{id:"nut_hp",label:"🥜腐朽坚果HP+5",cost:95,desc:plantUpgrades.nut_hp}];
    container.innerHTML = upgrades.map(u=>`<button class="btn upgrade-btn" data-up="${u.id}">${u.label} (${u.cost}🪙) 等级${u.desc}</button>`).join('');
    container.querySelectorAll('[data-up]').forEach(btn=>btn.onclick=()=>{
      let up=btn.dataset.up; let cost={pea_damage:110,pea_speed:85,sun_value:130,nut_hp:95}[up];
      if(globalCurrency>=cost){ globalCurrency-=cost; plantUpgrades[up]++; updateUI(); saveGame(); buildUpgradePanel(container); flashMsg(`升级成功，暂时苟且 ${up} Lv${plantUpgrades[up]}`,"#aaffaa",900); }
      else flashMsg("连苟活的币都没有了","#ff8888",700);
    });
  }
  
  $('loginBtn').onclick=()=>{ let name=$('username').value.trim(); if(!name){ $('loginError').innerText="名字不能为空，不然连墓碑都没有"; return; } currentGameUser=name; loadGame(); updateUI(); loginScreen.style.display="none"; menuScreen.style.display="block"; };
  $('startGameBtn').onclick=()=>{ let cont=$('levelsContainer'); cont.style.display="flex"; cont.innerHTML=""; for(let i=1;i<=Math.min(completedLevels+1,TOTAL_LEVELS);i++){ let d=document.createElement('div'); d.className="level-card"; d.innerHTML=`Level ${i}<br><small style="color:#dd9966">${getTheme(i).name}</small>`; d.onclick=()=>{ cont.style.display="none"; startLevel(i); }; cont.appendChild(d); } };
  $('menuUpgradeBtn').onclick=()=>{ let p=$('menuUpgradePanel'); p.style.display=p.style.display==="none"?"flex":"none"; buildUpgradePanel(p); };
  $('stockTradeBtn').onclick=()=>{ let panel=$('stockMarketPanel'); panel.style.display="block"; renderStockPanel(); updateStockCrash(); };
  $('backToMenuBtn').onclick=()=>{ clearInterval(updateInterval); cancelAnimationFrame(animFrameId); showMenu(); };
  $('showUpgradeBtn').onclick=()=>{ let p=$('upgradePanel'); p.style.display=p.style.display==="none"?"flex":"none"; if(p.children.length===0) buildUpgradePanel(p); };
  canvas.addEventListener("click",(e)=>{
    if(gameState!=="PLAYING") return;
    let rect=canvas.getBoundingClientRect(), sx=canvas.width/rect.width, sy=canvas.height/rect.height;
    let cx=(e.clientX-rect.left)*sx, cy=(e.clientY-rect.top)*sy;
    for(let i=0;i<almondWaters.length;i++) if(Math.hypot(almondWaters[i].x-cx,almondWaters[i].y-cy)<18){ sanity=Math.min(100,sanity+18); almondWaters.splice(i,1); flashMsg("💧 杏仁水苦涩但救赎理智","#77aaff",1000); showDreadText("短暂的清明..."); return; }
    for(let i=0;i<sunDrops.length;i++) if(Math.hypot(sunDrops[i].x-cx,sunDrops[i].y-cy)<18){ sun+=22; sunDrops.splice(i,1); $('sunAmount').innerText=Math.floor(sun); return; }
    let col=Math.floor(cx/CELL_W), row=Math.floor(cy/CELL_H); if(row>=ROWS||col>=COLS) return;
    let cost = {Pea:50,Snow:75,Sun:50,Nut:70,Pot:45,Potato:35,Cherry:150,TallNut:110}[selectedPlant]||50;
    if(sun>=cost && !grid[row][col] && terrain[row][col]!=='rock'){
      sun-=cost; $('sunAmount').innerText=Math.floor(sun);
      let maxHp = {Pea:3,Snow:3,Sun:3,Nut:6+plantUpgrades.nut_hp,Pot:6,Potato:1,Cherry:1,TallNut:14+plantUpgrades.nut_hp}[selectedPlant]||3;
      let plantObj = {type:selectedPlant, hp:maxHp, maxHp:maxHp, cd:0, sunTimer:selectedPlant==="Sun"?20:0, fuse:selectedPlant==="Potato"?140:0};
      if(selectedPlant==="Pot") grid[row][col] = {type:"Pot", hp:8, maxHp:8, underPlant:null, bonusHp:10};
      else grid[row][col] = plantObj;
    }
  });
  document.querySelectorAll("#plantButtons .btn[data-plant]").forEach(b=>b.onclick=()=>{ document.querySelectorAll("#plantButtons .btn").forEach(x=>x.classList.remove("sel")); b.classList.add("sel"); selectedPlant=b.dataset.plant; });
  setInterval(()=>{ if(gameState==="MENU") updateStockCrash(); }, 22000);
})();
</script>
</body>
